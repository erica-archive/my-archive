<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Archive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">📚 My Archive</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="add.html">+ Add Entry</a>
      <button id="themeToggle" class="theme-btn" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <!-- HERO -->
<section class="hero-collage">
    <h1 class="archive-title">Erica’s Archive</h1>
 <a href="photos.html" class="collage-item item-camera">
    <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/canonae1.jpg" alt="Film">
  </a>

  <a href="music.html" class="collage-item item-music">
    <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/borntodie-removebg-preview.png" alt="Music">
  </a>

  <a href="travel.html" class="collage-item item-travel">
    <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/airticket.png" alt="Travel">
  </a>

  <a href="books.html" class="collage-item item-book">
    <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/thebelljar-removebg-preview.png" alt="Books">
  </a>
  <a href="movies.html" class="collage-item item-clapperboard">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/clapperboard.png" alt="Clapperboard">
</a>
<a href="media.html" class="collage-item item-magazine">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/rookiemag.jpg" alt="Magazine">
</a>
  <a href="photos.html" class="collage-item item-filmcanister">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/kodakfilmcanister.png" alt="Film Canister">
</a>
<a href="photos.html" class="collage-item item-filmstrip">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/dualfilmstrip.png" alt="Film Strip">
</a> 
<div class="collage-item item-flower">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/flower.png" alt="Flower">
 </div>
<div class="collage-item item-shell">
  <img src="https://yioooxntaqmotudonzbz.supabase.co/storage/v1/object/public/photos/shell.png" alt="Shell">
</div> 
  </div>
</section>


  <!-- FILTER TAGS -->
  <section class="filter-section">
    <span class="filter-label">Filter by type:</span>
    <div class="filter-tags" id="filterTags">
      <button class="tag-btn active" data-filter="all">All</button>
      <button class="tag-btn" data-filter="note">📝 Note</button>
      <button class="tag-btn" data-filter="blog">✍️ Blog</button>
      <button class="tag-btn" data-filter="link">🔗 Link</button>
      <button class="tag-btn" data-filter="photo">📷 Photo</button>
    </div>
  </section>

  <!-- ENTRIES GRID -->
  <main class="container">
    <div class="entries-grid" id="entriesGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p>✨ Your archive is empty.</p>
      <a href="add.html" class="btn-primary">Add your first entry →</a>
    </div>
  </main>

  <footer class="footer">
    <p>Built with ♥ — your personal second brain.</p>
  </footer>

  <!-- Supabase library (loaded from CDN — no install needed) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/app.js"></script>

  
</body>
</html>
